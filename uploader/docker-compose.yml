services:
  blog:
    image: nginx:alpine
    ports:
      - "${BLOG_PORT:-8090}:80"
    volumes:
      - ../site/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - blog-dist:/srv/blog:ro
    depends_on:
      blog-builder:
        condition: service_healthy
    restart: unless-stopped

  blog-builder:
    build: ../site
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-images}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-images}}
      BUILD_SECRET: ${BUILD_SECRET:?set BUILD_SECRET in .env}
    volumes:
      - blog-dist:/srv/blog
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('node:fs').statSync('/srv/blog/current')\""]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s
    restart: unless-stopped

  images:
    build: .
    ports:
      - "3000:3000"
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://img.simonswanderlust.com}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-images}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-images}}
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://localhost:1234/v1}
      LMSTUDIO_MODEL: ${LMSTUDIO_MODEL:-qwen/qwen3-vl-4b}
      BUILD_SECRET: ${BUILD_SECRET:?set BUILD_SECRET in .env}
      BUILDER_URL: ${BUILDER_URL:-http://blog-builder:4000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-images}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-images}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-images} -d ${POSTGRES_DB:-images}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  blog-dist:
