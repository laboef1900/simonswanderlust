<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JPG → WebP Converter</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
      p.nav a { font-size: 0.9rem; }
      label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; }
      input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
      ul { list-style: none; padding: 0; }
      li { display: flex; justify-content: space-between; align-items: center; gap: 1rem;
           border: 1px solid #ddd; border-radius: 6px; padding: 0.5rem 0.75rem; margin: 0.5rem 0; }
      a.dl { font-weight: 600; }
      .meta { color: #555; font-size: 0.85rem; }
      #status { margin-top: 1rem; color: #555; }
    </style>
  </head>
  <body>
    <p class="nav"><a href="/admin/">← Hero upload</a> · <a href="/admin/batch.html">Batch uploader</a></p>
    <h1>JPG → WebP Converter</h1>
    <p>Select images — they convert to WebP automatically (full resolution, metadata kept).
       Nothing is stored on the server; just download the results.</p>

    <label for="token">Auth token</label>
    <input id="token" type="password" placeholder="Bearer token" />
    <label for="files">Images</label>
    <input id="files" type="file" accept="image/*" multiple />

    <div id="status">—</div>
    <ul id="out"></ul>

    <script>
      const $ = (id) => document.getElementById(id);

      $('files').addEventListener('change', async () => {
        const token = $('token').value.trim();
        const files = [...$('files').files].filter((f) => f.type.startsWith('image/'));
        $('out').innerHTML = '';
        if (!token) { $('status').textContent = 'Enter your auth token first, then pick images.'; return; }
        if (!files.length) { $('status').textContent = '—'; return; }

        const fd = new FormData();
        for (const f of files) fd.append('file', f);
        $('status').textContent = `Converting ${files.length} image(s)…`;
        try {
          const res = await fetch('/convert', {
            method: 'POST',
            headers: { authorization: 'Bearer ' + token },
            body: fd,
          });
          if (!res.ok) { $('status').textContent = 'Convert failed: ' + res.status; return; }
          const { results } = await res.json();
          for (const r of results) {
            const bytes = Uint8Array.from(atob(r.base64), (c) => c.charCodeAt(0));
            const url = URL.createObjectURL(new Blob([bytes], { type: 'image/webp' }));
            const kb = Math.round(bytes.length / 1024);
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.className = 'dl';
            a.href = url;
            a.download = r.name;
            a.textContent = '⬇ ' + r.name;
            const span = document.createElement('span');
            span.className = 'meta';
            span.textContent = kb + ' KB';
            li.append(a, span);
            $('out').appendChild(li);
          }
          $('status').textContent = `Converted ${results.length} image(s) — click to download.`;
        } catch (e) {
          $('status').textContent = 'Error: ' + e;
        }
      });
    </script>
  </body>
</html>
