server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro builds with trailingSlash: 'always' → every route is a
    # directory holding index.html, so serve $uri/ for clean URLs.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
