server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large image uploads to pass through to the uploader.
    client_max_body_size 30m;

    # Docker's embedded DNS, so `images` re-resolves if the container restarts.
    resolver 127.0.0.11 valid=10s;

    # WordPress-style: the admin panel lives on the site's own domain under
    # /admin/, reverse-proxied to the uploader (the `images` compose service).
    # The panel POSTs to /upload and /suggest, so those are proxied too. Image
    # variants themselves are still served from img.simonswanderlust.com.
    location /admin/ {
        set $uploader images:3000;
        proxy_pass http://$uploader;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /upload {
        set $uploader images:3000;
        proxy_pass http://$uploader;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /suggest {
        set $uploader images:3000;
        proxy_pass http://$uploader;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Astro builds with trailingSlash: 'always' → every route is a
    # directory holding index.html, so serve $uri/ for clean URLs.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
