# Full self-hosted stack: the static blog (nginx) + the image uploader service.
# Copy .env.example to .env and set AUTH_TOKEN before `docker compose up -d --build`.
services:
  blog:
    build: ./site
    ports:
      - "${BLOG_PORT:-8090}:80"
    depends_on:
      - images
    restart: unless-stopped

  images:
    build: ./uploader
    ports:
      - "3000:3000"
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://img.simonswanderlust.com}
      AUTH_TOKEN: ${AUTH_TOKEN:?set AUTH_TOKEN in .env}
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://localhost:1234/v1}
      LMSTUDIO_MODEL: ${LMSTUDIO_MODEL:-qwen/qwen3-vl-4b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./uploader/data:/data
    restart: unless-stopped
